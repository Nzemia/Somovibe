version: "3.9"
services:
  app:
    build: .
    image: questy:latest
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on: []
    # Uncomment and adjust if you want to ensure migrations run on start
    # command: sh -c "npx prisma migrate deploy && npm run start"
