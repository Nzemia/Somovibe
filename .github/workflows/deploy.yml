name: Deploy to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Validate secrets
        run: |
          missing=()
          if [ -z "${{ secrets.VPS_HOST }}" ]; then missing+=("VPS_HOST"); fi
          if [ -z "${{ secrets.VPS_USERNAME }}" ]; then missing+=("VPS_USERNAME"); fi
          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then missing+=("VPS_SSH_KEY"); fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}. Add them in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /opt/questy
            git pull origin master
            docker-compose down
            docker-compose build --no-cache
            docker-compose run --rm app npx prisma migrate deploy
            docker-compose up -d
            docker image prune -f
            
      - name: ✅ Deployment Status
        if: success()
        run: echo "Deployment successful!"
        
      - name: ❌ Deployment Failed
        if: failure()
        run: echo "Deployment failed! Check logs."
